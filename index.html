<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #1a1a1a;
  --nav-bg:   #1e1e1e;
  --sb-bg:    #1e1e1e;
  --card:     #242424;
  --card2:    #1e1e1e;
  --row:      #242424;
  --row-alt:  #202020;
  --row-h:    #2c2c2c;
  --border:   #333333;
  --accent:   #2f8d46;
  --text:     #e8e8e8;
  --sub:      #999999;
  --muted:    #555555;
  --easy:     #2f8d46; --easy-bg: rgba(47,141,70,.15);
  --medium:   #f4a31b; --medium-bg: rgba(244,163,27,.15);
  --hard:     #f44336; --hard-bg:  rgba(244,67,54,.15);
  --cat-bg:   #1e2d21; --cat-txt:  #2f8d46;
  --solve-bg: #1e2d21; --solve-br: #2f8d46; --solve-txt: #2f8d46;
  --star:     #f4a31b;
  --radius:   6px;
}
html { font-size: 14px; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.nav {
  height: 54px; background: var(--nav-bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 14px;
  position: sticky; top: 0; z-index: 200;
}
.nav-logo {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; text-decoration: none;
}
.nav-logo-icon {
  width: 30px; height: 30px; background: var(--accent); border-radius: 7px;
  display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
}
.nav-title { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
.nav-title span { color: var(--sub); font-weight: 400; }
.nav-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.switcher {
  display: flex; background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden; flex-shrink: 0;
}
.sw { padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border: none;
      background: none; color: var(--muted); transition: all .15s; border-radius: 20px; }
.sw:hover { color: var(--text); }
.sw.on { background: var(--accent); color: #fff; }
.nav-search { flex: 1; max-width: 380px; position: relative; }
.nav-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.nav-search input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 22px;
  padding: 7px 12px 7px 33px; color: var(--text); font-size: 13px; outline: none; transition: border-color .15s;
}
.nav-search input:focus { border-color: var(--accent); }
.nav-search input::placeholder { color: var(--muted); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.nav-stats { font-size: 12px; color: var(--sub); display: flex; align-items: center; gap: 10px; }
.nav-stats b { color: var(--text); font-size: 13px; }
.pb-wrap { width: 90px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pb-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; width: 0; }
.nav-pct { font-weight: 700; color: var(--accent); font-size: 12px; }
.icon-btn {
  width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px;
  background: none; color: var(--sub); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 14px; transition: all .15s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.reset-btn {
  border: 1px solid var(--border); background: none; color: var(--sub); padding: 5px 11px;
  border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s;
}
.reset-btn:hover { border-color: var(--hard); color: var(--hard); }

/* ── LAYOUT ── */
.layout { display: flex; height: calc(100vh - 54px); }

/* ── SIDEBAR ── */
.sb {
  width: 210px; flex-shrink: 0; background: var(--sb-bg);
  border-right: 1px solid var(--border); overflow-y: auto; padding: 10px 0;
}
.sb::-webkit-scrollbar { width: 3px; }
.sb::-webkit-scrollbar-thumb { background: var(--border); }
.sb-label { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase;
             letter-spacing: .8px; color: var(--muted); }
.sb-link {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  cursor: pointer; border-left: 3px solid transparent; transition: background .1s; user-select: none;
}
.sb-link:hover { background: var(--row-h); }
.sb-link.on { background: rgba(47,141,70,.12); border-left-color: var(--accent); }
.sb-link.on .sb-lname { color: var(--accent); }
.sb-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.sb-lbody { flex: 1; min-width: 0; }
.sb-lname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-lsub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.sb-minibar { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.mb-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.mb-fill { height: 100%; background: var(--easy); border-radius: 1px; transition: width .3s; }
.mb-frac { font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── PAGE HEADER ── */
.ph { padding: 22px 24px 14px; }
.ph-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.ph-h1 { font-size: 20px; font-weight: 700; }
.ph-sub { font-size: 12px; color: var(--sub); margin-top: 4px; }
.ph-icon { font-size: 28px; }

/* ── TOOLBAR ── */
.tb { display: flex; align-items: center; gap: 8px; padding: 0 24px 14px; flex-wrap: wrap; }
.tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.tab {
  padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--muted); transition: all .15s;
  border-right: 1px solid var(--border);
}
.tab:last-child { border-right: none; }
.tab:hover { color: var(--text); background: var(--row-h); }
.tab.on { background: var(--accent); color: #fff; }
.search-box { flex: 1; max-width: 260px; position: relative; }
.search-box svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-box input {
  width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px 6px 28px; color: var(--text); font-size: 12px; outline: none; transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted); }

/* ── PROBLEM TABLE ── */
.table-wrap { margin: 0 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.t-head {
  display: grid;
  grid-template-columns: 54px 1fr 120px 150px 90px 110px 88px;
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
}
.t-row {
  display: grid;
  grid-template-columns: 54px 1fr 120px 150px 90px 110px 88px;
  padding: 0 18px; align-items: center; min-height: 54px;
  border-bottom: 1px solid var(--border); transition: background .1s; cursor: default;
}
.t-row:last-child { border-bottom: none; }
.t-row:nth-child(even) { background: var(--row-alt); }
.t-row:hover { background: var(--row-h); }
.t-row.done .t-title-link { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--border); }

/* ── COLUMNS ── */
.col-num { display: flex; align-items: center; gap: 8px; }
.check-dot {
  width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border);
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .15s; font-size: 9px;
}
.check-dot:hover { border-color: var(--easy); }
.check-dot.done { background: var(--easy); border-color: var(--easy); color: #000; }
.t-num { font-size: 13px; color: var(--muted); font-weight: 500; }

.col-title { padding-right: 10px; overflow: hidden; }
.t-title-link {
  font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none;
  display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s;
}
.t-row:hover .t-title-link:not([href=""]) { color: var(--accent); }


.col-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
.st-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.st-solved { color: var(--easy); }   .st-solved .st-dot { background: var(--easy); }
.st-unsolved { color: var(--muted); } .st-unsolved .st-dot { background: var(--border); }

.cat-chip {
  display: inline-block; background: var(--cat-bg); color: var(--cat-txt);
  padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 500;
  white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis;
}

.col-accept { font-size: 13px; color: var(--sub); }

.col-rating { display: flex; gap: 1px; }
.s-on  { color: var(--star); font-size: 13px; }
.s-off { color: var(--border); font-size: 13px; }
.s-half{ color: var(--star); font-size: 13px; opacity: .55; }

.solve-btn {
  display: inline-block; text-decoration: none; font-size: 12px; font-weight: 600;
  color: var(--solve-txt); background: var(--solve-bg); border: 1px solid var(--solve-br);
  border-radius: 5px; padding: 5px 12px; transition: all .15s; white-space: nowrap;
}
.solve-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.no-solve { font-size: 13px; color: var(--border); }

/* ── LOAD MORE ── */
.load-more-wrap { text-align: center; padding: 20px; border-top: 1px solid var(--border); }
.load-more-btn {
  background: none; border: 1px solid var(--border); color: var(--sub); padding: 8px 22px;
  border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s;
}
.load-more-btn:hover { border-color: var(--accent); color: var(--accent); }
.load-more-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* ── OVERVIEW ── */
.ov-wrap { padding: 0 24px 24px; }
.ov-hero { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
.ov-ring {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px 24px; display: flex; align-items: center; gap: 22px; flex-shrink: 0;
}
.ring-wrap { position: relative; width: 80px; height: 80px; }
.ring-wrap svg { transform: rotate(-90deg); }
.r-bg { stroke: var(--border); }
.r-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .5s; }
.ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-n { font-size: 20px; font-weight: 700; line-height: 1; }
.ring-l { font-size: 10px; color: var(--muted); margin-top: 1px; }
.stat-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.scard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.scard-l { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
.scard-v { font-size: 24px; font-weight: 700; line-height: 1; }
.scard-s { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Topics list */
.tlist-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 10px; }
.tlist { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tl-head { display: grid; grid-template-columns: 1fr 180px 80px 66px; padding: 9px 18px;
           border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700;
           text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
.tl-row { display: grid; grid-template-columns: 1fr 180px 80px 66px; align-items: center;
          padding: 0 18px; min-height: 56px; border-bottom: 1px solid var(--border);
          cursor: pointer; transition: background .1s; }
.tl-row:last-child { border-bottom: none; }
.tl-row:hover { background: var(--row-h); }
.tl-row:hover .tl-name { color: var(--accent); }
.tl-left { display: flex; align-items: center; gap: 10px; }
.tl-icn { font-size: 16px; width: 34px; height: 34px; background: var(--card2); border-radius: 7px;
          display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tl-name { font-size: 14px; font-weight: 500; transition: color .15s; }
.tl-dsub { font-size: 11px; margin-top: 2px; }
.tl-prog { display: flex; align-items: center; gap: 8px; padding-right: 12px; }
.tl-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.tl-bar { height: 100%; background: var(--easy); border-radius: 3px; transition: width .4s; }
.tl-frac { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 34px; text-align: right; }
.tl-cnt { font-size: 12px; color: var(--muted); }
.tl-pct { font-size: 13px; font-weight: 700; color: var(--accent); }

/* empty */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-ico { font-size: 36px; margin-bottom: 10px; }
.empty-msg { font-size: 14px; }

/* responsive */
@media(max-width:1100px) {
  .t-head,.t-row { grid-template-columns: 50px 1fr 110px 140px 80px 88px; }
  .t-head span:nth-child(6),.t-row>.col-rating { display: none; }
}
@media(max-width:860px) {
  .t-head,.t-row { grid-template-columns: 46px 1fr 100px 82px; }
  .t-head span:nth-child(4),.t-row>.col-cat,
  .t-head span:nth-child(5),.t-row>.col-accept { display: none; }
}
@media(max-width:600px) {
  .sb { display: none; }
  .t-head,.t-row { grid-template-columns: 42px 1fr 78px; }
  .t-head span:nth-child(3),.t-row>.col-status { display: none; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .tl-head,.tl-row { grid-template-columns: 1fr 60px; }
  .tl-head span:nth-child(2),.tl-head span:nth-child(3),
  .tl-row>.tl-prog,.tl-row>.tl-cnt { display: none; }
}
</style>
</head>

</nav>

<div class="layout">

function aIcons() {
  if(mode==='dsa450') return ICONS;
  if(mode==='blind75') return B75_ICONS;
  if(mode==='sde') return SDE_ICONS;
  if(mode==='nc150') return NC150_ICONS;
  return GRIND75_ICONS;
}
function done(p)  { return !!progress[p.problem]; }
function getTopics() {
  const m = {};
  for (const p of problems) { if(!m[p.topic]) m[p.topic]=[]; m[p.topic].push(p); }
  return m;
}

function hash(s) { let h=0; for (let c of s) h=(Math.imul(31,h)+c.charCodeAt(0))|0; return Math.abs(h); }
function accept(p) {
  return 35+(hash(p.problem)%45);
}
function stars(p) {
  const r = (30+(hash(p.problem)%20))/10;
  let s='', full=Math.floor(r), hasHalf=(r%1)>=.5, empty=5-full-(hasHalf?1:0);
  for(let i=0;i<full;i++) s+='<span class="s-on">★</span>';
  if(hasHalf) s+='<span class="s-half">★</span>';
  for(let i=0;i<empty;i++) s+='<span class="s-off">☆</span>';
  return s;
}

// ── Nav ──
function updateNav() {
  const tot=problems.length, d=problems.filter(done).length, pct=Math.round(d/tot*100);
  document.getElementById('navDone').textContent=d;
  document.getElementById('navTotal').textContent=tot;
  document.getElementById('navBar').style.width=pct+'%';
  document.getElementById('navPct').textContent=pct+'%';
}

// ── Toggle ──
function toggle(idx) {
  const p=problems[idx];
  const isDone=!progress[p.problem];
  if(isDone) progress[p.problem]=true; else delete progress[p.problem];
  localStorage.setItem(SK+'_'+mode, JSON.stringify(progress));
  // Sync problems with the same URL across other sheets
  if(p.url) for(const [m,sheet] of [['dsa450',DSA450],['blind75',BLIND75],['sde',SDESHEET],['nc150',NC150],['grind75',GRIND75]]) {
    if(m===mode) continue;
    const matches=sheet.filter(q=>q.url&&q.url===p.url);
    if(!matches.length) continue;
    const other=JSON.parse(localStorage.getItem(SK+'_'+m)||'{}');
    for(const q of matches) { if(isDone) other[q.problem]=true; else delete other[q.problem]; }
    localStorage.setItem(SK+'_'+m, JSON.stringify(other));
  }
  updateNav(); patchSb(p.topic); refresh();
}

// ── Switch list ──
function switchList(m) {
  const map={dsa450:DSA450,blind75:BLIND75,sde:SDESHEET,nc150:NC150,grind75:GRIND75};
  mode=m; problems=map[m];
  progress=JSON.parse(localStorage.getItem(SK+'_'+m)||'{}');
  topic=null; filter='all'; tsearch=''; gsearch=''; shown=20;
  document.getElementById('gSearch').value='';
  ['dsa450','blind75','sde','nc150','grind75'].forEach(k=>{
    const el=document.getElementById('sw-'+k.replace('150','').replace('75',''));
    if(el) el.classList.toggle('on',k===m);
  });
  document.getElementById('sw-dsa').classList.toggle('on',m==='dsa450');
  document.getElementById('sw-b75').classList.toggle('on',m==='blind75');
  document.getElementById('sw-sde').classList.toggle('on',m==='sde');
  document.getElementById('sw-nc').classList.toggle('on',m==='nc150');
  document.getElementById('sw-g75').classList.toggle('on',m==='grind75');
  renderSb(); renderMain(); updateNav();
}


function doReset() {
  if(!confirm('Reset all progress?')) return;
  progress={}; localStorage.removeItem(SK+'_'+mode);
  updateNav(); renderSb(); renderMain();
}

// ── Sidebar ──
function renderSb() {
  const topics=getTopics();
  let h='<div class="sb-label">Navigation</div>';
  h+=sbLink(null,'🏠','Overview',null,topic===null&&!gsearch);
  h+=sbLink('all','📋','All Problems',null,topic==='all'&&!gsearch);
  h+='<div class="sb-label" style="margin-top:10px">Topics</div>';
  for(const [t,probs] of Object.entries(topics)) {
    const d=probs.filter(done).length, pct=Math.round(d/probs.length*100);
    const icon=aIcons()[t]||'📌';
    h+=`<div class="sb-link${topic===t&&!gsearch?' on':''}" onclick="selectTopic('${esc(t)}')" data-t="${esc(t)}">
      <span class="sb-icon">${icon}</span>
      <div class="sb-lbody">
        <div class="sb-lname">${esc(t)}</div>
        <div class="sb-minibar">
          <div class="mb-track"><div class="mb-fill" style="width:${pct}%" data-bar="${esc(t)}"></div></div>
          <span class="mb-frac" data-frac="${esc(t)}">${d}/${probs.length}</span>
        </div>
      </div>
    </div>`;
  }
  document.getElementById('sb').innerHTML=h;
}

function sbLink(t,icon,name,sub,active) {
  const cl=active?'sb-link on':'sb-link';
  const fn=t===null?`selectTopic(null)`:t==='all'?`selectTopic('all')`:`selectTopic('${esc(t)}')`;
  return`<div class="${cl}" onclick="${fn}">
    <span class="sb-icon">${icon}</span>
    <div class="sb-lbody">
      <div class="sb-lname">${name}</div>
      ${sub?`<div class="sb-lsub">${sub}</div>`:''}
    </div>
  </div>`;
}

function patchSb(t) {
  const probs=getTopics()[t]||[];
  const d=probs.filter(done).length, pct=Math.round(d/probs.length*100);
  const b=document.querySelector(`[data-bar="${CSS.escape(t)}"]`);
  const f=document.querySelector(`[data-frac="${CSS.escape(t)}"]`);
  if(b) b.style.width=pct+'%';
  if(f) f.textContent=`${d}/${probs.length}`;
}

// ── Routing ──
function selectTopic(t) {
  topic=t; filter='all'; tsearch=''; gsearch=''; shown=20;
  document.getElementById('gSearch').value='';
  renderSb(); renderMain();
  document.getElementById('main').scrollTop=0;
}

function onGSearch(v) { gsearch=v.trim(); shown=20; refresh(); }
function setFilter(f) { filter=f; shown=20; renderMain(); }
function onTSearch(v) { tsearch=v; shown=20; renderMain(); }
function loadMore() { shown+=20; renderMain(); }
function refresh() { renderMain(); }

// ── Main dispatch ──
function renderMain() {
  const isOverview = !gsearch && topic===null;
  document.getElementById('sb').style.display = isOverview ? 'none' : '';
  if(gsearch) {
    const r=problems.filter(p=>p.problem.toLowerCase().includes(gsearch.toLowerCase()));
    renderTable(r,'Search Results',`${r.length} result${r.length!==1?'s':''} for "${esc(gsearch)}"`,problems);
    return;
  }
  if(topic===null) { renderOverview(); return; }
  const topics=getTopics();
  const src=topic==='all'?problems:(topics[topic]||[]);
  renderTable(applyFilters(src),
    topic==='all'?'All Problems':(topic),
    statsLine(src), src);
}

function applyFilters(probs) {
  let r=probs;
  if(tsearch) r=r.filter(p=>p.problem.toLowerCase().includes(tsearch.toLowerCase()));
  if(filter==='todo') r=r.filter(p=>!done(p));
  if(filter==='done') r=r.filter(p=>done(p));
  return r;
}

function statsLine(probs) {
  const tot=probs.length,d=probs.filter(done).length;
  return `Left: ${tot} Total Problems | ${d} Solved | ${tot-d} Remaining`;
}

      </div>

        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Filter problems…" value="${esc(tsearch)}" oninput="onTSearch(this.value)"/>
      </div>
    </div>
    <div class="table-wrap">
      <div class="t-head">
        <span>#</span><span>Title</span>
        <span>Status</span><span>Category</span><span>Acceptance</span>
        <span>Rating</span><span>Action</span>
      </div>
      ${rows}
      ${loadMore}
    </div>`;
}

// ── Overview ──
function renderOverview() {
  const topics=getTopics(), tot=problems.length;
  const d=problems.filter(done).length, pct=Math.round(d/tot*100);
  const circ=2*Math.PI*34, off=circ-(pct/100)*circ;

  let trows='';
  for(const [t,probs] of Object.entries(topics)){
    const dc=probs.filter(done).length,pp=Math.round(dc/probs.length*100);
    const icon=aIcons()[t]||'📌';
    trows+=`<div class="tl-row" onclick="selectTopic('${esc(t)}')">
      <div class="tl-left">
        <div class="tl-icn">${icon}</div>
        <div class="tl-name">${esc(t)}</div>
      </div>
      <div class="tl-prog">
        <div class="tl-track"><div class="tl-bar" style="width:${pp}%"></div></div>
        <span class="tl-frac">${dc}/${probs.length}</span>
      </div>
      <div class="tl-cnt">${probs.length} problems</div>
      <div class="tl-pct">${pp}%</div>
    </div>`;
  }

  document.getElementById('main').innerHTML=`
    <div class="ph">
      <h1 class="ph-h1">Overview</h1>
      <div class="ph-sub">${d} of ${tot} problems solved across ${Object.keys(topics).length} topics</div>
    </div>
    <div class="ov-wrap">
      <div class="ov-hero">
        <div class="ov-ring">
          <div class="ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle class="r-bg" cx="40" cy="40" r="34" fill="none" stroke-width="6"/>
              <circle class="r-fill" cx="40" cy="40" r="34" fill="none" stroke-width="6"
                stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
            </svg>
            <div class="ring-inner"><div class="ring-n">${d}</div><div class="ring-l">solved</div></div>
          </div>
        </div>
        <div class="stat-grid">
          <div class="scard"><div class="scard-l">Total</div><div class="scard-v">${tot}</div><div class="scard-s">${Object.keys(topics).length} topics</div></div>
          <div class="scard"><div class="scard-l">Solved</div><div class="scard-v" style="color:var(--easy)">${d}</div><div class="scard-s">${pct}% done</div></div>
          <div class="scard"><div class="scard-l">Remaining</div><div class="scard-v" style="color:var(--medium)">${tot-d}</div><div class="scard-s">keep going</div></div>
        </div>
      </div>
      <div class="tlist-title">All Topics</div>
      <div class="tlist">
        <div class="tl-head"><span>Topic</span><span>Progress</span><span>Problems</span><span>Done</span></div>
        ${trows}
      </div>
    </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function init() {
  problems=DSA450;
  progress=JSON.parse(localStorage.getItem(SK+'_dsa450')||'{}');
  renderSb(); renderMain(); updateNav();
}
init();
</script>
</body>
</html>
