<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Tracker</title>
<script>
  (function () {
    try {
      if (localStorage.getItem('dsa_v4_dark') !== '0') {
        document.documentElement.style.background = '#030303';
      }
    } catch (_) {}
  }());
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./styles/main.css"/>
</head>
<body>
<script>
  (function () {
    try {
      if (localStorage.getItem('dsa_v4_dark') !== '0') {
        document.body.classList.add('dark');
      }
    } catch (_) {}
  }());
</script>
<nav class="nav">
  <div class="nav-brand">
    <span class="nav-logo">DSA <span>Tracker</span></span>
    <span class="nav-tagline">Curated problems · Track your journey</span>
  </div>
  <div class="nav-right">
    <div class="nav-stats"><b><span id="navDone">0</span>/<span id="navTotal">0</span></b> solved</div>
    <div class="settings-wrap">
      <button class="settings-gear" onclick="toggleSettings()" title="Settings">&#9881;</button>
      <div class="settings-dropdown" id="settings-dropdown">
        <button id="theme-toggle-btn" onclick="toggleDark();toggleSettings()">🌙 Light Mode</button>
        <button onclick="doExport();toggleSettings()">⬇ Export</button>
        <button onclick="document.getElementById('importFile').click();toggleSettings()">⬆ Import</button>
        <button class="danger" onclick="doReset();toggleSettings()">&#x1F5D1; Reset</button>
      </div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(this)"/>
    <button class="auth-btn" id="auth-btn" onclick="handleAuthClick()" title="">Sign in</button>
  </div>
</nav>

<div class="signin-modal" id="signin-modal">
  <div class="signin-box">
    <div class="signin-title">Sign In</div>
    <div class="signin-sub">Sync your progress across devices</div>
    <div class="signin-providers">
      <button class="signin-provider-btn" onclick="signInWith('google')">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <button class="signin-provider-btn" onclick="signInWith('github')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </button>
    </div>
    <button class="signin-cancel" onclick="closeSignIn()">Cancel</button>
  </div>
</div>

<div class="container">
  <div class="list-tabs">
    <button class="list-tab on" id="sw-home" onclick="switchList('overview')">&#x1F3E0; Overview</button>
    <button class="list-tab" id="sw-dsa" onclick="switchList('dsa450')">&#x1F4E6; 450 DSA</button>
    <button class="list-tab" id="sw-b75" onclick="switchList('blind75')">&#x1F441; Blind 75</button>
    <button class="list-tab" id="sw-sde" onclick="switchList('sde')">&#x1F4CB; SDE Sheet</button>
    <button class="list-tab" id="sw-nc" onclick="switchList('nc150')">&#x1F3AF; NeetCode 150</button>
    <button class="list-tab" id="sw-g75" onclick="switchList('grind75')">&#x26A1; Grind 169</button>
  </div>
  <section class="overview-panel" id="overview-panel"></section>
  <section class="sheet-stats-grid section-hidden" id="sheet-stats-grid"></section>
  <div id="sheet-view" class="section-hidden">
  <div class="progress-section">
    <div class="prog-label" id="prog-label">0/448 completed (0%)</div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
  <div class="filter-bar">
    <div class="f-search">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="gSearch" type="text" placeholder="Search problems..." oninput="onGSearch(this.value)"/>
    </div>
    <select class="f-select" id="topic-sel" onchange="setTopicFilter(this.value)">
      <option value="all">All Topics</option>
    </select>
    <div class="status-tabs">
      <button class="s-tab on" id="st-all" onclick="setStatus('all')">All</button>
      <button class="s-tab" id="st-todo" onclick="setStatus('todo')">Todo</button>
      <button class="s-tab" id="st-done" onclick="setStatus('done')">Done</button>
    </div>
  </div>
  <div class="ptable">
    <div class="pt-header">
      <span></span><span>#</span><span>Title</span><span>Topic</span><span>Action</span>
    </div>
    <div id="ptable-body"></div>
  </div>
  </div>
</div>

<div id="note-modal" class="note-modal" style="display:none" onclick="if(event.target===this)closeNote()">
  <div class="note-modal-box">
    <div class="note-modal-title" id="note-modal-title"></div>
    <textarea id="note-textarea" class="note-textarea" placeholder="Add your notes, approach, time/space complexity, links…"></textarea>
    <div class="note-modal-btns">
      <button class="note-close-btn" onclick="closeNote()">Cancel</button>
      <button class="note-save-btn" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script src="./scripts/constants.js"></script>
<script src="./scripts/datasets.js"></script>
<script src="./scripts/firebase-sync.js"></script>
<script src="./scripts/app.js"></script>
</body>
</html>
